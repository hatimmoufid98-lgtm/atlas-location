databases:
  - name: atlas-db
    databaseName: atlas_location
    user: atlas_user
    plan: free

services:
  - type: web
    name: atlas-location
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: "bash build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: atlas-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: WEB_CONCURRENCY
        value: "4"
